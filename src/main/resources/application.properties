# ===============================
# 1. SERVER CONFIGURATION
# ===============================
server.port=8080
server.error.include-message=always

# ===============================
# 2. DATABASE CONFIGURATION (Aiven Cloud MySQL)
# ===============================
# Connects directly to your Aiven Cloud Database in Bangalore (blr)
spring.datasource.url=jdbc:mysql://${DB_HOST:global-atm-db-v2-vaishnavshah-bc20.a.aivencloud.com}:${DB_PORT:22618}/defaultdb?sslMode=REQUIRED
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 3. JPA / HIBERNATE SETTINGS
# ===============================
# Update the schema if entities change
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Keep the session open for lazy loading in views
spring.jpa.open-in-view=true
# Dialect for modern MySQL (Fixed deprecation warning)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 4. BLOCKCHAIN CONFIGURATION (Web3j)
# ===============================
# Connects to your local Ganache blockchain or production node
web3j.client-address=${WEB3J_CLIENT_ADDRESS:http://127.0.0.1:7545}
# Connection timeout (useful if blockchain is slow)
web3j.http-timeout-seconds=60

# ===============================
# 5. THYMELEAF CONFIGURATION
# ===============================
# Disable cache so you don't have to restart server to see HTML changes
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# 6. LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.global.atm_blockchain=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# 7. OLLAMA LOCAL AI INTEGRATION (100% FREE & SECURE)
# ===============================
ollama.api.url=http://localhost:11434/api/chat
ollama.model=llama3