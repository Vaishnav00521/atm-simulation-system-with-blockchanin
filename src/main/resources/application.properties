# ===============================
# 1. SERVER & PROFILES CONFIGURATION
# ===============================
# Server Configuration
server.port=8081
server.error.include-message=always
# Activate the local (H2 in-memory DB) profile by default
spring.profiles.active=local

# ===============================
# 2. JPA / HIBERNATE SETTINGS
# ===============================
# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Keep the session open for lazy loading in views
spring.jpa.open-in-view=true


# ===============================
# 4. BLOCKCHAIN CONFIGURATION (Web3j)
# ===============================
# Connects to your local Ganache blockchain or production node
web3j.client-address=http://127.0.0.1:7545
# Connection timeout (useful if blockchain is slow)
web3j.http-timeout-seconds=60

# ===============================
# 5. THYMELEAF CONFIGURATION
# ===============================
# Disable cache so you don't have to restart server to see HTML changes
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# 6. LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.global.atm_blockchain=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# 7. GEMINI AI AGENT (Direct-to-Inference)
# ===============================
gemini.api.key=YOUR_GEMINI_API_KEY_HERE

# ===============================
# 8. SECURITY CONFIGURATION
# ===============================
# Disable auto-generated password warning
spring.security.user.name=admin
spring.security.user.password=admin

