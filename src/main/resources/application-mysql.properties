# ===================================================================
# MYSQL PROFILE PROPERTIES (Aiven Cloud or Local Docker MySQL)
# ===================================================================

# 1. Database Connections
spring.datasource.url=jdbc:mysql://${DB_HOST:global-atm-db-v2-vaishnavshah-bc20.a.aivencloud.com}:${DB_PORT:22618}/defaultdb?sslMode=REQUIRED
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Dialect and Schema Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
