# ===============================
# 1. SERVER CONFIGURATION
# ===============================
server.port=8080
server.error.include-message=always

# ===============================
# 2. DATABASE CONFIGURATION (MySQL)
# ===============================
# Automatically creates the database 'atm_global_db' if it doesn't exist
spring.datasource.url=jdbc:mysql://localhost:3306/atm_global_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 3. JPA / HIBERNATE SETTINGS
# ===============================
# Update the schema if entities change (use 'validate' in production)
# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
# Keep the session open for lazy loading in views
spring.jpa.open-in-view=true
# Dialect for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# 4. BLOCKCHAIN CONFIGURATION (Web3j)
# ===============================
# Connects to your local Ganache blockchain
web3j.client-address=http://127.0.0.1:7545
# Connection timeout (useful if blockchain is slow)
web3j.http-timeout-seconds=60

# ===============================
# 5. THYMELEAF CONFIGURATION
# ===============================
# Disable cache so you don't have to restart server to see HTML changes
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# 6. LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.global.atm_blockchain=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# OLLAMA LOCAL AI INTEGRATION (100% FREE & SECURE)
ollama.api.url=http://localhost:11434/api/chat
ollama.model=llama3