# ===================================================================
# LOCAL PROFILE PROPERTIES (In-Memory Database for Offline Run)
# ===================================================================

# 1. H2 Database Datasource
spring.datasource.url=jdbc:h2:mem:atm_blockchain;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. JPA & Hibernate Platform Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# 3. Enable H2 console for browsing DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
